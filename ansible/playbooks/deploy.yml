---
# ============================================================
# Playbook: deploy.yml
# Purpose:  Deploy the Turf Booking Platform using Docker
#           Compose on the target server.
# Usage:    ansible-playbook ansible/playbooks/deploy.yml
# ============================================================

- name: Deploy Turf Booking Platform
  hosts: webservers
  become: true

  vars:
    app_dir: /opt/turf-booking
    compose_file: docker-compose.prod.yml

  tasks:
    # ------- Prepare App Directory -------
    - name: Create application directory
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    # ------- Copy Deployment Files -------
    - name: Copy docker-compose.prod.yml to remote host
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../docker-compose.prod.yml"
        dest: "{{ app_dir }}/docker-compose.prod.yml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"

    - name: Copy environment file to remote host
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../server/.env"
        dest: "{{ app_dir }}/.env"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"

    # ------- Pull Latest Docker Images -------
    - name: Pull latest Docker images
      ansible.builtin.command: docker compose -f {{ compose_file }} pull
      args:
        chdir: "{{ app_dir }}"
      register: pull_result
      changed_when: "'Downloaded' in pull_result.stdout or 'Pull complete' in pull_result.stdout"

    # ------- Deploy the Application -------
    - name: Stop existing containers (if running)
      ansible.builtin.command: docker compose -f {{ compose_file }} down
      args:
        chdir: "{{ app_dir }}"
      register: stop_result
      changed_when: "'Removed' in stop_result.stdout"
      failed_when: false

    - name: Start application stack
      ansible.builtin.command: docker compose -f {{ compose_file }} up -d
      args:
        chdir: "{{ app_dir }}"
      register: deploy_result
      changed_when: "'Started' in deploy_result.stdout or 'Created' in deploy_result.stdout"

    # ------- Verify Deployment -------
    - name: Wait for containers to start
      ansible.builtin.pause:
        seconds: 10

    - name: Check running containers
      ansible.builtin.command: docker compose -f {{ compose_file }} ps
      args:
        chdir: "{{ app_dir }}"
      register: container_status
      changed_when: false

    - name: Display deployment status
      ansible.builtin.debug:
        msg: |
          ========================================
          Deployment Complete!
          ========================================
          {{ container_status.stdout }}
          ========================================

    # ------- Health Check -------
    - name: Verify backend is responding
      ansible.builtin.uri:
        url: "http://localhost:5000"
        method: GET
        status_code: [200, 404]
        timeout: 10
      register: backend_health
      retries: 3
      delay: 5
      until: backend_health is succeeded
      failed_when: false

    - name: Verify frontend is responding
      ansible.builtin.uri:
        url: "http://localhost:80"
        method: GET
        status_code: 200
        timeout: 10
      register: frontend_health
      retries: 3
      delay: 5
      until: frontend_health is succeeded
      failed_when: false

    - name: Display health check results
      vars:
        be_msg: "UNHEALTHY — run: docker compose logs backend"
        fe_msg: "UNHEALTHY — run: docker compose logs frontend"
      ansible.builtin.debug:
        msg: |
          Backend:  {{ 'HEALTHY' if backend_health is succeeded else be_msg }}
          Frontend: {{ 'HEALTHY' if frontend_health is succeeded else fe_msg }}
